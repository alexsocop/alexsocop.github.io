title: Alex Socop
description: |
  <p>Myron Alexander Socop Arango（舒冠宇）</p>

  <p>Xelajuj No'j (Quetzaltenango), Guatemala, 1988. Indigenous K’iche’ Maya scholar and writer. His literary work has been published in diverse magazines and collections. The most recent one is <em>Punto de partida 190</em> (UNAM, 2015). He published <em>Temblores del silencio</em> (Metáfora editores, 2012) and <em>Poemas sueltos</em> (90 plaquettes, 2014). He has participated in poetry festivals in Central America and Mexico, and he was part of the organizing committee for the Quetzaltenango International Poetry Festival from 2011 to 2019.</p>

  <p>In 2021, he received the MOFA scholarship to pursue doctoral studies at National Taiwan Normal University. In 2024, he was granted the Broadening Participation in Cognitive Science Initiative Award for the project: <em>The Cognitive Science Behind the Adventures of Junajpu and Xbalamke: Spreading Awareness of Cognitive Science Among Educators in Mayan and Mestizo Communities.</em></p>

  <p>His academic and professional interests broadly include shared book reading and brain development, EMI, multicultural and global education, and environmental humanities.</p>

  <p>Currently he works as a research assistant at the <a href="https://www.ntnuchildbrain.org/people" target="_blank">Child Brain Development and Learning Lab</a> at NTNU.</p>

